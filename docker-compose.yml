services:
  comfyui:
    build: .
    image: ltx-comfyui:latest
    container_name: ltx-comfyui
    restart: unless-stopped

    # GPU access — requires nvidia-container-toolkit on the host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8188:8188"

    volumes:
      # Mount your local models directory into the container.
      # Place all files from models.txt into ./models/ before starting.
      - ./models:/app/ComfyUI/models

      # Optional: persist generated outputs
      - ./output:/app/ComfyUI/output

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    # Increase shared memory for large model loading
    shm_size: "16gb"
