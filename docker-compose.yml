services:
  comfyui:
    build: .
    image: ltx-comfyui:latest
    container_name: ltx-comfyui
    restart: unless-stopped

    # GPU access — requires nvidia-container-toolkit on the host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8188:8188"

    volumes:
      # Mount your local models directory into the container.
      # Place all files from models.txt into ./models/ before starting.
      - ./models:/workspace/models

      # Optional: persist generated outputs
      - ./output:/workspace/output

      # Optional: persist uploaded inputs
      - ./input:/workspace/input

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Set to "1" to auto-download models on first start (requires HF_TOKEN for gated models)
      - DOWNLOAD_MODELS=0
      # - HF_TOKEN=your_token_here

    # Increase shared memory for large model loading
    shm_size: "16gb"
